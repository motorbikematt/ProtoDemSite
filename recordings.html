<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meeting Minutes — South Dayton Democratic Club</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .dir-wrap {
      position: sticky; top: var(--nav-h); z-index: 90;
      background: var(--warm-white); border-bottom: 1px solid var(--border);
    }
    .dir-filters {
      max-width: var(--max-w); margin: 0 auto; padding: 10px 32px 0;
      display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
    }
    .dir-filters-label { font-size: 11px; font-weight: 600; color: var(--slate-mid); }
    .dir-filters select, .dir-filters input[type="text"] {
      font-family: var(--font-sans); font-size: 12px; padding: 5px 12px;
      border-radius: 20px; border: 1px solid var(--border);
      background: var(--cream); color: var(--slate); outline: none; width: auto;
    }
    .dir-filters select:focus, .dir-filters input:focus { border-color: var(--sky-mid); background: var(--warm-white); }
    .dir-filters input { min-width: 200px; }
    .dir-strip {
      max-width: var(--max-w); margin: 0 auto; padding: 0 32px;
      display: flex; overflow-x: auto; scrollbar-width: none;
    }
    .dir-strip::-webkit-scrollbar { display: none; }
    .dir-card {
      flex-shrink: 0; width: 180px; padding: 10px 14px;
      border-right: 1px solid var(--border); border-bottom: 3px solid transparent;
      margin-bottom: -1px; cursor: pointer; transition: background .12s;
    }
    .dir-card:first-child { border-left: 1px solid var(--border); }
    .dir-card:hover  { background: var(--cream); }
    .dir-card.active { background: var(--cream); border-bottom-color: var(--charcoal); }
    .dc-date { font-size: 12px; font-weight: 600; color: var(--charcoal); margin-bottom: 3px; }
    .dc-tag  { font-size: 10px; color: var(--slate-mid); display: flex; align-items: center; gap: 5px; }
    .dc-dot  { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .dc-dot-v { background: var(--sky-deep); }
    .dc-dot-m { background: var(--border-dark); }

    .page-body {
      max-width: var(--max-w); margin: 0 auto;
      padding: 48px 32px 80px;
      display: grid; grid-template-columns: 1fr 280px;
      gap: 56px; align-items: start;
    }

    /* Article */
    .article-kicker { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--sky-deep); margin-bottom: 10px; }
    .article-title { font-family: var(--font-display); font-size: clamp(22px,3vw,34px); font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; color: var(--charcoal); margin-bottom: 14px; }
    .article-byline { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; font-size: 13px; color: var(--slate-mid); padding-bottom: 18px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    .byline-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--border-dark); }
    .meta-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 28px; }
    .chip { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); color: var(--slate); background: var(--warm-white); }
    .chip-lbl { font-weight: 600; color: var(--slate-mid); }
    .chip-sky { background: var(--sky); color: var(--sky-dark); border-color: transparent; }
    .chip-dark { background: var(--charcoal); color: #fff; border-color: transparent; }

    /* Video */
    .video-hero { width: 100%; aspect-ratio: 16/9; background: #0d0d0d; border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 28px; }
    .video-hero iframe, .video-hero #yt-player { width: 100%; height: 100%; border: none; display: block; }
    .no-video-banner { display: flex; align-items: center; gap: 14px; padding: 16px 20px; margin-bottom: 28px; background: var(--cream); border: 1px solid var(--border); border-radius: var(--radius-lg); }
    .no-video-icon { font-size: 20px; opacity: .4; flex-shrink: 0; }
    .no-video-text { font-size: 13px; color: var(--slate-mid); line-height: 1.6; }
    .no-video-text strong { color: var(--slate); }

    /* Editorial */
    .ed-block { margin-bottom: 28px; }
    .ed-block h3 { font-family: var(--font-display); font-size: 13px; font-weight: 600; font-style: italic; color: var(--slate-mid); margin-bottom: 10px; }
    .ed-block p { font-size: 15px; line-height: 1.8; color: var(--slate); }

    /* Speakers */
    .speakers-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 28px; }

    /* Timestamps */
    .ts-list { display: flex; flex-direction: column; margin-bottom: 28px; }
    .ts-row { display: flex; gap: 16px; align-items: baseline; padding: 8px 8px; border-bottom: 1px solid var(--border); cursor: pointer; border-radius: var(--radius-sm); transition: background .1s; margin: 0 -8px; }
    .ts-row:last-child { border-bottom: none; }
    .ts-row:hover { background: var(--cream); }
    .ts-time { font-size: 12px; font-weight: 700; color: var(--sky-deep); min-width: 40px; font-variant-numeric: tabular-nums; }
    .ts-label { font-size: 13px; color: var(--slate); line-height: 1.4; }

    /* Synced transcript */
    .tx-section { margin-bottom: 32px; }
    .tx-section h3 { font-family: var(--font-display); font-size: 13px; font-weight: 600; font-style: italic; color: var(--slate-mid); margin-bottom: 14px; }
    .tx-panel { border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; background: var(--warm-white); }
    .tx-panel-hdr { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--cream); }
    .tx-panel-hdr-label { font-size: 11px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--slate-mid); }
    .tx-sync-badge { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; color: var(--sky-deep); }
    .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--sky-mid); }
    .sync-dot.live { animation: pulse-dot 1.4s ease-in-out infinite; }
    @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:.35;transform:scale(.65);} }
    .tx-body { height: 280px; overflow-y: auto; padding: 12px 8px; scroll-behavior: smooth; }
    .tx-body::-webkit-scrollbar { width: 3px; }
    .tx-body::-webkit-scrollbar-thumb { background: var(--border-dark); border-radius: 2px; }
    .tx-seg { display: flex; gap: 14px; padding: 7px 10px; border-radius: var(--radius-sm); cursor: pointer; transition: background .1s; margin-bottom: 1px; align-items: baseline; }
    .tx-seg:hover { background: var(--cream); }
    .tx-seg.active { background: var(--sky); }
    .tx-seg.active .tx-t { color: var(--sky-dark); }
    .tx-seg.active .tx-w { color: var(--sky-dark); font-weight: 500; }
    .tx-seg.past .tx-t { color: var(--border-dark); }
    .tx-seg.past .tx-w { color: var(--slate-mid); }
    .tx-t { font-size: 11px; font-weight: 700; color: var(--slate-mid); min-width: 36px; font-variant-numeric: tabular-nums; flex-shrink: 0; padding-top: 2px; transition: color .1s; }
    .tx-w { font-size: 14px; line-height: 1.65; color: var(--slate); transition: color .1s; }
    .tx-pending { padding: 24px; text-align: center; font-size: 13px; color: var(--slate-mid); line-height: 1.65; }

    /* Minutes */
    .minutes-section { margin-bottom: 32px; }
    .minutes-section h3 { font-family: var(--font-display); font-size: 13px; font-weight: 600; font-style: italic; color: var(--slate-mid); margin-bottom: 14px; }
    .minutes-panel { border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; background: var(--warm-white); }
    .minutes-panel-hdr { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; border-bottom: 1px solid var(--border); background: var(--cream); }
    .minutes-panel-hdr-label { font-size: 11px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--slate-mid); }
    .minutes-src-link { font-size: 11px; font-weight: 500; color: var(--sky-deep); display: flex; align-items: center; gap: 5px; padding: 3px 10px; border: 1px solid var(--sky); border-radius: 20px; transition: background .1s; }
    .minutes-src-link:hover { background: var(--sky); color: var(--sky-dark); }
    .minutes-body { padding: 20px 24px; }
    .agenda-item { margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
    .agenda-item:last-child { border: none; margin-bottom: 0; padding-bottom: 0; }
    .agenda-item-label { display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 600; color: var(--charcoal); margin-bottom: 8px; }
    .agenda-item-label::before { content:''; width:3px; height:14px; background:var(--sky-mid); border-radius:2px; flex-shrink:0; }
    .agenda-item-text { font-size: 14px; line-height: 1.85; color: var(--slate); font-family: var(--font-display); font-weight: 400; }
    .motion-block { margin-top: 10px; padding: 10px 14px; background: var(--cream); border-left: 3px solid var(--charcoal); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; font-size: 13px; color: var(--charcoal); line-height: 1.6; }

    /* Community hint */
    .community-hint { margin-top: 28px; padding: 16px 20px; background: var(--cream); border-radius: var(--radius-lg); border: 1px solid var(--border); display: flex; align-items: center; gap: 14px; }
    .community-hint-icon { font-size: 18px; opacity: .4; flex-shrink: 0; }
    .community-hint p { font-size: 13px; color: var(--slate-mid); line-height: 1.65; }
    .community-hint strong { color: var(--slate); }

    /* Aside */
    .article-aside { position: sticky; top: calc(var(--nav-h) + 110px); }
    .aside-sec { margin-bottom: 28px; }
    .aside-lbl { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--slate-mid); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .aside-lbl::after { content:''; flex:1; height:1px; background:var(--border); }
    .sddc-about { background: var(--charcoal); border-radius: var(--radius-lg); padding: 18px 20px; margin-bottom: 28px; }
    .sddc-about h4 { font-family: var(--font-display); font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 8px; }
    .sddc-about p { font-size: 12px; color: rgba(255,255,255,.5); line-height: 1.7; }
    .sddc-about a { color: var(--sky-mid); }
    .adj-card { border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; cursor: pointer; transition: border-color .15s; background: var(--warm-white); }
    .adj-card:hover { border-color: var(--border-dark); }
    .adj-card-body { padding: 12px 14px; }
    .adj-org  { font-size: 9px; font-weight: 700; letter-spacing: .09em; text-transform: uppercase; color: var(--sky-deep); margin-bottom: 4px; }
    .adj-date { font-family: var(--font-display); font-size: 14px; color: var(--charcoal); margin-bottom: 4px; }
    .adj-topic { font-size: 11px; color: var(--slate-mid); }
    .more-item { padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: opacity .12s; }
    .more-item:last-child { border: none; }
    .more-item:hover { opacity: .65; }
    .more-date  { font-size: 12px; font-weight: 600; color: var(--charcoal); margin-bottom: 2px; }
    .more-topic { font-size: 11px; color: var(--slate-mid); margin-bottom: 2px; }
    .more-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 500; color: var(--sky-deep); }

    @media (max-width: 960px) {
      .page-body { grid-template-columns: 1fr; gap: 32px; padding: 24px 20px 60px; }
      .article-aside { position: static; }
      .dir-filters { padding: 8px 16px 0; }
      .dir-strip   { padding: 0 16px; }
    }
  </style>
</head>

<nav class="site-nav" id="site-nav"></nav>

<div class="dir-wrap">

══════════════════════════════════════════════════════ */

/* ══════════════════════════════════════════════════════
   YOUTUBE IFRAME API (Gemini wiring)
══════════════════════════════════════════════════════ */
let player = null;
let syncInterval = null;
let activeId = 1;

function onYouTubeIframeAPIReady() {
  const m = MEETINGS.find(x => x.id === activeId);
  if (m && m.hasVideo) initPlayer(m.ytId);
}

function initPlayer(ytId) {
  if (player) { player.destroy(); player = null; }
  player = new YT.Player('yt-player', {
    height: '100%', width: '100%',
    videoId: ytId,
    playerVars: { enablejsapi: 1, rel: 0, modestbranding: 1 },
    events: { onStateChange: onPlayerStateChange }
  });
}

function onPlayerStateChange(event) {
  clearInterval(syncInterval);
  if (event.data === YT.PlayerState.PLAYING) {
    syncInterval = setInterval(() => {
      updateTranscriptHighlight(player.getCurrentTime());
    }, 100);
  }
}

function updateTranscriptHighlight(t) {
  const m = MEETINGS.find(x => x.id === activeId);
  if (!m || !m.transcript) return;
  const segs = document.querySelectorAll('.tx-seg');
  let activeIdx = -1;
  m.transcript.forEach((s, i) => { if (t >= s.start) activeIdx = i; });
  segs.forEach((el, i) => {
    el.classList.remove('active','past');
    if (i === activeIdx) { el.classList.add('active'); el.scrollIntoView({behavior:'smooth',block:'nearest'}); }
    else if (i < activeIdx) el.classList.add('past');
  });
}

function seekTo(s) {
  if (player && player.seekTo) { player.seekTo(s, true); updateTranscriptHighlight(s); }
}

function fmt(s) { return Math.floor(s/60)+':'+(Math.floor(s%60)+'').padStart(2,'0'); }

/* ══════════════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════════════ */
function renderStrip(list) {
  document.getElementById('dir-strip').innerHTML = list.length
    ? list.map(m=>`
        <div class="dir-card ${m.id===activeId?'active':''}" onclick="pick(${m.id})">
          <div class="dc-date">${m.shortDate}</div>
          <div class="dc-tag">
            <div class="dc-dot ${m.hasVideo?'dc-dot-v':'dc-dot-m'}"></div>
            ${m.hasVideo?'Video + minutes':'Minutes only'}
          </div>
        </div>`).join('')
    : '<div style="padding:14px 16px;font-size:12px;color:var(--slate-mid)">No results.</div>';
}

function renderArticle(m) {
  const chips = [
    ...m.topics.map(t=>`<span class="chip chip-sky">${t}</span>`),
    ...(m.hasVideo?['<span class="chip chip-dark">&#9654; Video available</span>']:[]),
  ].join('');

  const speakersHtml = m.speakers.length
    ? `<div class="speakers-row">${m.speakers.map(s=>`<span class="chip"><span class="chip-lbl">Speaker&thinsp;</span>${s}</span>`).join('')}</div>`
    : '';

  const videoBlock = m.hasVideo
    ? `<div class="video-hero"><div id="yt-player"></div></div>`
    : `<div class="no-video-banner">
        <div class="no-video-icon">&#127909;</div>
        <div class="no-video-text"><strong>This meeting was not recorded.</strong> Written minutes are available below and via the source Google Doc. Video will appear here once the club begins regular recording.</div>
       </div>`;

  /* Timestamps (video meetings only) */
  const tsBlock = (m.hasVideo && m.timestamps && m.timestamps.length) ? `
    <div class="ed-block">
      <h3>Key timestamps</h3>
      <div class="ts-list">${m.timestamps.map(ts=>`
        <div class="ts-row" onclick="seekTo(${ts.s})">
          <span class="ts-time">${ts.t}</span><span class="ts-label">${ts.label}</span>
        </div>`).join('')}
      </div>
    </div>` : '';

  /* Transcript panel (video meetings with transcript data) */
  const txBlock = m.hasVideo ? `
    <div class="tx-section">
      <h3>Live transcript</h3>
      <div class="tx-panel">
        <div class="tx-panel-hdr">
          <span class="tx-panel-hdr-label">Auto-generated transcript</span>
          <div class="tx-sync-badge">
            <div class="sync-dot ${m.transcript?'live':''}"></div>
            ${m.transcript ? 'Synced to video' : 'Transcript pending — fetch via /api/transcript?v='+m.ytId}
          </div>
        </div>
        ${m.transcript && m.transcript.length
          ? `<div class="tx-body" id="tx-body">
              ${m.transcript.map(seg=>`
                <div class="tx-seg" onclick="seekTo(${seg.start})">
                  <span class="tx-t">${fmt(seg.start)}</span>
                  <span class="tx-w">${seg.text}</span>
                </div>`).join('')}
             </div>`
          : `<div class="tx-pending">
               Transcript not yet loaded for this recording.<br>
               <span style="font-size:11px;margin-top:6px;display:block">
                 Populate via <code>youtube-transcript-api</code> →
                 <code>/api/transcript?v=${m.ytId}</code>
               </span>
             </div>`
        }
      </div>
    </div>` : '';

  const agendaHtml = m.agendaItems.map(a=>`
    <div class="agenda-item">
      <div class="agenda-item-label">${a.label}</div>
      <p class="agenda-item-text">${a.text}</p>
      ${a.motion?`<div class="motion-block"><strong>Motion:</strong> ${a.motion.text}</div>`:''}
    </div>`).join('');

  document.getElementById('article-main').innerHTML = `
    ${videoBlock}
    <div class="article-kicker">South Dayton Democratic Club</div>
    <h1 class="article-title">${m.date} — Meeting</h1>
    <div class="article-byline">
      <span>${m.date}</span>
      <span class="byline-dot"></span>
      <span>Wright Memorial Public Library / Kettering</span>
      <span class="byline-dot"></span>
      <span>${m.hasVideo?'Video + Minutes':'Minutes only'}</span>
    </div>
    <div class="meta-chips">${chips}</div>
    ${speakersHtml}
    <div class="ed-block"><h3>Meeting summary</h3><p>${m.summary}</p></div>
    <div class="ed-block"><h3>Why this meeting matters</h3><p>${m.whyItMatters}</p></div>
    ${tsBlock}
    ${txBlock}
    <div class="minutes-section">
      <h3>Meeting minutes</h3>
      <div class="minutes-panel">
        <div class="minutes-panel-hdr">
          <span class="minutes-panel-hdr-label">Official minutes</span>
          <a class="minutes-src-link" href="${m.gdocUrl}" target="_blank" rel="noopener">View source doc &rarr;</a>
        </div>
        <div class="minutes-body">${agendaHtml}</div>
      </div>
    </div>
    <div class="community-hint">
      <div class="community-hint-icon">&#9998;</div>
      <p><strong>Community commentary is coming soon.</strong> Members and the public will be able to submit observations for moderator review.</p>
    </div>`;
}

function renderAside(m) {
  const all = MEETINGS.filter(x=>x.id!==m.id);
  const idx = MEETINGS.findIndex(x=>x.id===m.id);
  const next = MEETINGS[idx+1];
  const prev = MEETINGS[idx-1];
  const more = all.filter(x=>x.id!==( next?next.id:null) && x.id!==(prev?prev.id:null)).slice(0,4);

  let html = `
    <div class="sddc-about">
      <h4>South Dayton Democratic Club</h4>
      <p>Last Tuesday of the month, 5:30 PM<br>September through May<br><br>
        <a href="https://daytondem.org" target="_blank" rel="noopener">daytondem.org</a> &middot;
        <a href="mailto:southdaytondems@gmail.com">Email the club</a>
      </p>
    </div>`;

  if (next) html += `
    <div class="aside-sec">
      <div class="aside-lbl">Earlier meeting</div>
      <div class="adj-card" onclick="pick(${next.id})">
        <div class="adj-card-body">
          <div class="adj-org">SDDC</div>
          <div class="adj-date">${next.shortDate}</div>
          <div class="adj-topic">${next.topics.slice(0,2).join(', ')}</div>
        </div>
      </div>
    </div>`;

  if (prev) html += `
    <div class="aside-sec">
      <div class="aside-lbl">Later meeting</div>
      <div class="adj-card" onclick="pick(${prev.id})">
        <div class="adj-card-body">
          <div class="adj-org">SDDC</div>
          <div class="adj-date">${prev.shortDate}</div>
          <div class="adj-topic">${prev.topics.slice(0,2).join(', ')}</div>
        </div>
      </div>
    </div>`;

  if (more.length) {
    html += `<div class="aside-sec"><div class="aside-lbl">Archive</div>`;
    more.forEach(r=>{
      html += `<div class="more-item" onclick="pick(${r.id})">
        <div class="more-date">${r.shortDate}</div>
        <div class="more-topic">${r.topics.slice(0,2).join(', ')}</div>
        <div class="more-badge"><div class="dc-dot ${r.hasVideo?'dc-dot-v':'dc-dot-m'}" style="width:6px;height:6px;border-radius:50%;flex-shrink:0;background:${r.hasVideo?'var(--sky-deep)':'var(--border-dark)'}"></div>${r.hasVideo?'Video + minutes':'Minutes only'}</div>
      </div>`;
    });
    html += `</div>`;
  }

  document.getElementById('article-aside').innerHTML = html;
}

/* ══════════════════════════════════════════════════════
   PICK & FILTER
══════════════════════════════════════════════════════ */
function pick(id) {
  clearInterval(syncInterval);
  activeId = id;
  const m = MEETINGS.find(x=>x.id===id);
  renderStrip(getFiltered());
  renderArticle(m);
  renderAside(m);
  window.scrollTo({top:0,behavior:'smooth'});
  setTimeout(()=>{
    const card=document.querySelector('.dir-card.active');
    if(card) card.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  },60);
  if (m.hasVideo) {
    if (player && player.loadVideoById) {
      player.loadVideoById(m.ytId); /* Gemini: swap without reinit */
    } else if (typeof YT!=='undefined' && YT.Player) {
      initPlayer(m.ytId);
    }
  } else {
    if (player) { player.destroy(); player=null; }
  }
}

function getFiltered() {
  const year = document.getElementById('f-year').value;
  const type = document.getElementById('f-type').value;
  const q    = document.getElementById('f-search').value.toLowerCase();
  return MEETINGS.filter(m=>
    (!year || m.year===year) &&
    (!type || (type==='video'?m.hasVideo:!m.hasVideo)) &&
    (!q    || m.date.toLowerCase().includes(q) ||
      m.topics.some(t=>t.toLowerCase().includes(q)) ||
      m.speakers.some(s=>s.toLowerCase().includes(q)) ||
      m.summary.toLowerCase().includes(q) ||
      m.agendaItems.some(a=>a.text.toLowerCase().includes(q)))
  );
}

function applyFilter() {
  const f=getFiltered();
  renderStrip(f);
  if(!f.find(m=>m.id===activeId)&&f.length) pick(f[0].id);
}

pick(1);
</script>

</html>
